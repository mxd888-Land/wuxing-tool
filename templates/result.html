<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的五行能量｜美想道</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary:    #7B1A2E;
  --bg:         #F0E6D8;
  --gold:       #C9A96E;
  --text:       #3D2B1F;
  --light:      #FDFAF6;
  --muted:      #8B6055;
  --elem-color: {{ element_info.color }};
  --elem-bg:    {{ element_info.bg_color }};
}
body {
  font-family: 'Noto Serif TC', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px 60px;
}

/* Header */
.header {
  width: 100%;
  max-width: 480px;
  text-align: center;
  padding: 44px 0 24px;
  border-bottom: 1px solid var(--gold);
  margin-bottom: 32px;
}
.brand     { font-size: 22px; color: var(--primary); letter-spacing: 6px; font-weight: 700; }
.brand-sub { font-size: 11px; color: var(--gold); letter-spacing: 4px; margin-top: 5px; }

.main { width: 100%; max-width: 480px; }

/* Intro */
.intro { text-align: center; margin-bottom: 24px; }
.intro-label { font-size: 12px; color: var(--muted); letter-spacing: 3px; }
.birth-date  { font-size: 14px; color: var(--primary); letter-spacing: 2px; margin-top: 4px; }

/* Element card */
.elem-card {
  background: var(--light);
  border-radius: 20px;
  padding: 36px 24px 28px;
  text-align: center;
  box-shadow: 0 6px 30px rgba(123,26,46,0.10);
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
}
.elem-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(to right, var(--elem-color), var(--gold), var(--elem-color));
}
.elem-pre-label {
  font-size: 12px;
  color: #A08070;
  letter-spacing: 3px;
  margin-bottom: 22px;
}
.elem-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: var(--elem-bg);
  border: 2px solid var(--elem-color);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 18px;
}
.elem-char {
  font-size: 54px;
  font-weight: 700;
  color: var(--elem-color);
  line-height: 1;
}
.elem-en {
  font-size: 11px;
  color: var(--elem-color);
  letter-spacing: 2px;
  margin-top: 5px;
  opacity: 0.75;
}
.elem-k       { font-size: 12px; color: #A08070; margin-bottom: 6px; letter-spacing: 1px; }
.elem-tagline { font-size: 18px; color: var(--primary); letter-spacing: 3px; font-weight: 600; }

/* Description card */
.desc-card {
  background: var(--light);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(123,26,46,0.06);
  margin-bottom: 20px;
}
.desc-text {
  font-size: 15px;
  line-height: 2.1;
  color: #4A3328;
  letter-spacing: 0.5px;
  margin-bottom: 20px;
}
.advice-box {
  background: var(--bg);
  border-left: 3px solid var(--gold);
  border-radius: 0 10px 10px 0;
  padding: 14px 16px;
}
.advice-label { font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 6px; font-weight: 600; }
.advice-text  { font-size: 14px; color: var(--text); line-height: 1.9; letter-spacing: 0.5px; }

/* Divider */
.divider {
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  margin: 20px 0;
}

/* CTA */
.cta-btn {
  display: block;
  width: 100%;
  padding: 18px 16px;
  background: var(--primary);
  color: var(--light);
  text-decoration: none;
  text-align: center;
  border-radius: 12px;
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  letter-spacing: 2px;
  margin-bottom: 14px;
  transition: background 0.2s, transform 0.1s;
}
.cta-btn:active { background: #5C1220; transform: scale(0.98); }
.cta-sub { font-size: 12px; opacity: 0.75; display: block; margin-top: 4px; letter-spacing: 1px; }

.back-link {
  display: block;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  text-decoration: none;
  letter-spacing: 2px;
  padding: 10px;
}

.footer {
  margin-top: 28px;
  font-size: 11px;
  color: #B09080;
  text-align: center;
  letter-spacing: 3px;
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">美 想 道</div>
  <div class="brand-sub">MEI XIANG DAO</div>
</div>

<div class="main">

  <div class="intro">
    <div class="intro-label">你 的 五 行 能 量</div>
  </div>

  <div class="elem-card">
    <div class="elem-circle">
      <div class="elem-char">{{ element_info.name }}</div>
      <div class="elem-en">{{ element_info.english }}</div>
    </div>
    <div class="elem-tagline">{{ element_info.tagline }}</div>
  </div>

  <div class="desc-card">
    <p class="desc-text">{{ element_info.description }}</p>
    <div class="advice-box">
      <div class="advice-label">✦ 能量提醒</div>
      <div class="advice-text">{{ element_info.advice }}</div>
    </div>
  </div>

  <div class="divider"></div>

  <a href="{{ gamma_link }}" target="_blank" class="cta-btn">
    了解更多
  </a>

  <a href="/" class="back-link">← 重 新 測 算</a>

</div>

<div class="footer">向 內 觀 己 ・ 向 外 綻 放</div>

</body>
</html>
